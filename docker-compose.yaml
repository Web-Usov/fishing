services:
  postgres:
    image: postgres:16-alpine
    container_name: fishing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fishing
      POSTGRES_USER: fishing
      POSTGRES_PASSWORD: fishing
    ports:
      - "5433:5432"
    volumes:
      - fishing-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fishing -d fishing"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.monorepo
    container_name: fishing-api
    restart: unless-stopped
    command: pnpm --filter @fishing/api dev
    environment:
      DATABASE_URL: postgresql://fishing:fishing@postgres:5432/fishing
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/api
          target: /app/apps/api
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./packages
          target: /app/packages
          ignore:
            - "**/node_modules/"
            - "**/dist/"
        - action: sync
          path: ./package.json
          target: /app/package.json
        - action: sync
          path: ./pnpm-workspace.yaml
          target: /app/pnpm-workspace.yaml
        - action: sync
          path: ./tsconfig.base.json
          target: /app/tsconfig.base.json
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./apps/api/package.json

  web:
    build:
      context: .
      dockerfile: Dockerfile.monorepo
    container_name: fishing-web
    restart: unless-stopped
    command: pnpm --filter @fishing/web exec next dev -H 0.0.0.0 -p 3000
    env_file:
      - ./apps/web/.env
    environment:
      NEXT_PUBLIC_MAP_PROVIDER: ${NEXT_PUBLIC_MAP_PROVIDER:-yandex}
    ports:
      - "3010:3000"
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./apps/web
          target: /app/apps/web
          ignore:
            - node_modules/
            - .next/
        - action: sync
          path: ./packages
          target: /app/packages
          ignore:
            - "**/node_modules/"
            - "**/dist/"
        - action: sync
          path: ./package.json
          target: /app/package.json
        - action: sync
          path: ./pnpm-workspace.yaml
          target: /app/pnpm-workspace.yaml
        - action: sync
          path: ./tsconfig.base.json
          target: /app/tsconfig.base.json
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./apps/web/package.json

  admin:
    build:
      context: .
      dockerfile: Dockerfile.monorepo
    container_name: fishing-admin
    restart: unless-stopped
    command: pnpm --filter @fishing/admin exec next dev -H 0.0.0.0 -p 3002
    ports:
      - "3012:3002"
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./apps/admin
          target: /app/apps/admin
          ignore:
            - node_modules/
            - .next/
        - action: sync
          path: ./packages
          target: /app/packages
          ignore:
            - "**/node_modules/"
            - "**/dist/"
        - action: sync
          path: ./package.json
          target: /app/package.json
        - action: sync
          path: ./pnpm-workspace.yaml
          target: /app/pnpm-workspace.yaml
        - action: sync
          path: ./tsconfig.base.json
          target: /app/tsconfig.base.json
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./apps/admin/package.json

  mobile:
    build:
      context: .
      dockerfile: Dockerfile.monorepo
    container_name: fishing-mobile
    restart: unless-stopped
    command: pnpm --filter @fishing/mobile exec expo start --host lan --port 8081
    environment:
      EXPO_NO_TELEMETRY: "1"
      CHOKIDAR_USEPOLLING: "true"
      CI: "1"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    stdin_open: true
    tty: true
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./apps/mobile
          target: /app/apps/mobile
          ignore:
            - node_modules/
            - .expo/
        - action: sync
          path: ./packages
          target: /app/packages
          ignore:
            - "**/node_modules/"
            - "**/dist/"
        - action: sync
          path: ./package.json
          target: /app/package.json
        - action: sync
          path: ./pnpm-workspace.yaml
          target: /app/pnpm-workspace.yaml
        - action: sync
          path: ./tsconfig.base.json
          target: /app/tsconfig.base.json
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./apps/mobile/package.json

  docs:
    build:
      context: .
      dockerfile: Dockerfile.monorepo
    container_name: fishing-docs
    restart: unless-stopped
    command: pnpm --filter @fishing/docs docs:serve
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./apps/docs
          target: /app/apps/docs
          ignore:
            - node_modules/
            - site/
        - action: sync
          path: ./package.json
          target: /app/package.json
        - action: sync
          path: ./pnpm-workspace.yaml
          target: /app/pnpm-workspace.yaml
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./apps/docs/package.json

volumes:
  fishing-postgres-data:
